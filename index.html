<!DOCTYPE html>
<html>
<head>
    <title>Interactive Mindful Face</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #FFFFFF;
            padding: 20px;
        }

        .frame-container {
            width: 100%;
            max-width: 901px;
            margin: auto;
        }

        .frame {
            width: 100%;
            height: 0;
            padding-bottom: 56.827%;
            border: 2px solid #8F8F8F;
            border-radius: calc(29 * 100vw / 901);
            position: relative;
            background-color: #FFFFFF;
            animation: normalBreathing 5s ease-in-out infinite;
        }

        @keyframes normalBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.98); }
        }

        @keyframes deepBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.975); }
        }

        @keyframes boxBreathing {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(0.985); }
            50% { transform: scale(0.985); }
            75% { transform: scale(1); }
        }

        @keyframes relaxBreathing {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(0.982); }
            70% { transform: scale(0.982); }
        }

        .content-wrapper {
            position: absolute;
            top: 15.625%;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .eyes-container {
            display: flex;
            justify-content: space-between;
            width: 38.957%;
            margin-bottom: 6.25%;
        }

        .eye {
            width: calc(35 * 100vw / 901);
            height: calc(34 * 100vw / 901);
            max-width: 35px;
            max-height: 34px;
            background-color: #8F8F8F;
            border-radius: 50%;
            transition: height 0.1s;
            flex-shrink: 0;
            cursor: pointer;
        }

        .mouth-container {
            width: 57.27%;
            height: auto;
        }

        .blink {
            height: 2px !important;
        }

        .slow-blink {
            transition: height 0.3s;
        }

        .very-slow-blink {
            transition: height 0.5s;
        }

        path {
            transition: opacity 0.3s ease;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="frame-container">
        <div class="frame" id="breathing-frame">
            <div class="content-wrapper">
                <div class="eyes-container">
                    <div class="eye" id="left-eye"></div>
                    <div class="eye" id="right-eye"></div>
                </div>
                <div class="mouth-container">
                    <svg width="100%" height="100%" viewBox="0 0 516 54" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path id="smile-path" d="M2 2C138.333 52 377.667 52 514 2" stroke="#8F8F8F" stroke-width="2" stroke-linecap="round"/>
                        <path id="speak-path" d="M2 27H514" stroke="#8F8F8F" stroke-width="2" stroke-linecap="round" opacity="0"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <audio id="meditation-audio" loop>
        <source src="10-Minute Guided Meditation_ Self-Love  SELF (mp3cut.net).mp3" type="audio/mp3">
    </audio>

    <script>
        const frame = document.getElementById('breathing-frame');
        const leftEye = document.getElementById('left-eye');
        const rightEye = document.getElementById('right-eye');
        const smilePath = document.getElementById('smile-path');
        const speakPath = document.getElementById('speak-path');
        const audio = document.getElementById('meditation-audio');
        
        let isMediating = false;
        let audioContext = null;
        let analyser = null;
        let isDeepBreathing = false;

        // Breathing patterns
        const breathingPatterns = {
            normal: {
                animation: 'normalBreathing 5s ease-in-out infinite',
                duration: 5000
            },
            deep: {
                animation: 'deepBreathing 8s ease-in-out infinite',
                duration: 8000
            },
            box: {
                animation: 'boxBreathing 16s linear',
                duration: 16000
            },
            relax: {
                animation: 'relaxBreathing 12s ease-in-out',
                duration: 12000
            }
        };

        function changeBreathingPattern(pattern, duration) {
            frame.style.animation = 'none';
            frame.offsetHeight; // Trigger reflow
            frame.style.animation = pattern;
            
            if (duration) {
                setTimeout(() => {
                    frame.style.animation = breathingPatterns.normal.animation;
                    isDeepBreathing = false;
                }, duration);
            }
        }

        function setupAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                analyser.fftSize = 32;
            }
        }

        function updateSpeakingAnimation(intensity) {
            const baseY = 27;  // Center line position
            const maxMovement = 20;  // Maximum movement range
            
            // Create natural speaking motion focused in the middle
            const time = Date.now() / 150;  // Speed of movement
            const movement = Math.sin(time) * maxMovement * intensity;
            
            // Keep ends fixed, move middle
            const path = `M2 ${baseY} ` +
                        `C172 ${baseY} ` +  // First control point stays level
                        `258 ${baseY + movement} ` +  // Middle point moves up/down
                        `344 ${baseY} ` +  // Third control point stays level
                        `514 ${baseY}`;    // End point
            
            speakPath.setAttribute('d', path);
        }

        // Left eye click handler - Toggle meditation with smoother transitions
        leftEye.addEventListener('click', () => {
            if (!isMediating) {
                setupAudioContext();
                // Start with line in center position
                speakPath.setAttribute('d', 'M2 27 C172 27 258 27 344 27 514 27');
                smilePath.style.opacity = '0';
                speakPath.style.opacity = '1';
                audio.play();
                isMediating = true;
                startAudioVisualization();
            } else {
                audio.pause();
                audio.currentTime = 0;
                isMediating = false;
                smilePath.style.opacity = '1';
                speakPath.style.opacity = '0';
            }
        });

        function startAudioVisualization() {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function animate() {
                if (!isMediating) return;
                
                analyser.getByteFrequencyData(dataArray);
                const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
                const normalizedIntensity = Math.min(average / 128, 1);
                
                updateSpeakingAnimation(normalizedIntensity);
                requestAnimationFrame(animate);
            }
            
            animate();
        }

        // Left eye click handler - Toggle meditation
        leftEye.addEventListener('click', () => {
            if (!isMediating) {
                setupAudioContext();
                smilePath.style.opacity = '0';
                speakPath.style.opacity = '1';
                audio.play();
                isMediating = true;
                startAudioVisualization();
            } else {
                audio.pause();
                audio.currentTime = 0;
                isMediating = false;
                smilePath.style.opacity = '1';
                speakPath.style.opacity = '0';
            }
        });

        // Right eye click handler - Trigger deep breathing
        rightEye.addEventListener('click', () => {
            if (!isDeepBreathing) {
                isDeepBreathing = true;
                changeBreathingPattern(breathingPatterns.deep.animation, 90000); // 1.5 minutes
            }
        });

        // Blinking logic
        const blinkTypes = {
            quick: { duration: 200, class: 'blink' },
            slow: { duration: 300, class: 'blink slow-blink' },
            mindful: { duration: 500, class: 'blink very-slow-blink' },
            double: { duration: 200, interval: 150, class: 'blink' }
        };

        function executeBlink(type) {
            const eyes = document.querySelectorAll('.eye');
            return new Promise((resolve) => {
                switch(type) {
                    case 'mindful':
                        eyes.forEach(eye => eye.classList.add(blinkTypes.mindful.class));
                        setTimeout(() => {
                            eyes.forEach(eye => eye.classList.remove(blinkTypes.mindful.class));
                            resolve();
                        }, blinkTypes.mindful.duration);
                        break;
                    case 'double':
                        eyes.forEach(eye => eye.classList.add(blinkTypes.double.class));
                        setTimeout(() => {
                            eyes.forEach(eye => eye.classList.remove(blinkTypes.double.class));
                            setTimeout(() => {
                                eyes.forEach(eye => eye.classList.add(blinkTypes.double.class));
                                setTimeout(() => {
                                    eyes.forEach(eye => eye.classList.remove(blinkTypes.double.class));
                                    resolve();
                                }, blinkTypes.double.duration);
                            }, blinkTypes.double.interval);
                        }, blinkTypes.double.duration);
                        break;
                    case 'slow':
                        eyes.forEach(eye => eye.classList.add(blinkTypes.slow.class));
                        setTimeout(() => {
                            eyes.forEach(eye => eye.classList.remove(blinkTypes.slow.class));
                            resolve();
                        }, blinkTypes.slow.duration);
                        break;
                    default:
                        eyes.forEach(eye => eye.classList.add(blinkTypes.quick.class));
                        setTimeout(() => {
                            eyes.forEach(eye => eye.classList.remove(blinkTypes.quick.class));
                            resolve();
                        }, blinkTypes.quick.duration);
                }
            });
        }

        async function blink() {
            const types = ['quick', 'quick', 'quick', 'slow', 'mindful', 'double'];
            const selectedType = types[Math.floor(Math.random() * types.length)];
            
            await executeBlink(selectedType);
            
            const minDelay = 21000;
            const maxDelay = 29000;
            const nextBlinkDelay = Math.random() * (maxDelay - minDelay) + minDelay;
            
            setTimeout(blink, nextBlinkDelay);
        }

        // Start animations
        setTimeout(blink, Math.random() * 5000 + 3000);
    </script>
</body>
</html>
