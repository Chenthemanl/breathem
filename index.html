<!DOCTYPE html>
<html>
<head>
    <title>Mindful Face</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #FFFFFF;
            padding: 20px;
        }

        .frame-container {
            width: 100%;
            max-width: 901px;
            margin: auto;
        }

        .frame {
            width: 100%;
            height: 0;
            padding-bottom: 56.827%;
            border: 2px solid #8F8F8F;
            border-radius: calc(29 * 100vw / 901);
            position: relative;
            background-color: #FFFFFF;
            animation: normalBreathing 5s ease-in-out infinite;
        }

        @keyframes normalBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.98); }
        }

        @keyframes deepBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.975); }
        }

        .content-wrapper {
            position: absolute;
            top: 15.625%;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .eyes-container {
            display: flex;
            justify-content: space-between;
            width: 38.957%;
            margin-bottom: 6.25%;
        }

        .eye {
            width: 35px;
            height: 34px;
            background-color: #8F8F8F;
            border-radius: 50%;
            cursor: pointer;
        }

        .mouth-container {
            width: 57.27%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="frame-container">
        <div class="frame" id="breathing-frame">
            <div class="content-wrapper">
                <div class="eyes-container">
                    <div class="eye" id="left-eye"></div>
                    <div class="eye" id="right-eye"></div>
                </div>
                <div class="mouth-container">
                    <svg id="mouth" width="100%" height="100%" viewBox="0 0 516 54" fill="none">
                        <path id="mouth-path" d="M2 27C138.333 27 377.667 27 514 27" stroke="#8F8F8F" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <audio id="meditation-audio" src="YOUR_AUDIO_LINK_HERE" crossorigin="anonymous"></audio>

    <script>
        const frame = document.getElementById("breathing-frame");
        const leftEye = document.getElementById("left-eye");
        const rightEye = document.getElementById("right-eye");
        const audio = document.getElementById("meditation-audio");
        const mouthPath = document.getElementById("mouth-path");
        let meditationActive = false;
        let deepBreathingActive = false;
        let audioContext = null;

        function changeBreathingPattern(animation, duration = 120000) {
            if (deepBreathingActive) return;
            deepBreathingActive = true;
            frame.style.animation = 'none';
            frame.offsetHeight;
            frame.style.animation = animation;

            setTimeout(() => {
                frame.style.animation = "normalBreathing 5s ease-in-out infinite";
                deepBreathingActive = false;
            }, duration);
        }

        function toggleMeditation() {
            if (meditationActive) {
                audio.pause();
                audio.currentTime = 0;
                mouthPath.setAttribute("d", "M2 27C138.333 27 377.667 27 514 27");
                meditationActive = false;
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                }
            } else {
                audio.play();
                monitorAudioForMouthMovement();
                meditationActive = true;
            }
        }

        function monitorAudioForMouthMovement() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function updateMouth() {
                if (!meditationActive) return;
                analyser.getByteFrequencyData(dataArray);
                const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                const intensity = Math.min(avg / 10, 10);
                const newControl = 27 + intensity;
                mouthPath.setAttribute("d", `M2 ${27 - intensity}C138.333 ${newControl} 377.667 ${newControl} 514 ${27 - intensity}`);
                requestAnimationFrame(updateMouth);
            }
            updateMouth();
        }

        leftEye.addEventListener("click", toggleMeditation);
        rightEye.addEventListener("click", () => {
            changeBreathingPattern("deepBreathing 8s ease-in-out infinite", 120000);
        });
    </script>
</body>
</html>
