<!DOCTYPE html>
<html>
<head>
    <title>Mindful</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #FFFFFF;
            padding: 20px;
        }

        .frame-container {
            width: 100%;
            max-width: 901px;
            margin: auto;
        }

        .frame {
            width: 100%;
            height: 0;
            padding-bottom: 56.827%;
            border: 2px solid #8F8F8F;
            border-radius: calc(29 * 100vw / 901);
            position: relative;
            background-color: #FFFFFF;
            animation: normalBreathing 5s ease-in-out infinite;
        }

        @keyframes normalBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.98); }
        }

        @keyframes deepBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.975); }
        }

        .content-wrapper {
            position: absolute;
            top: 15.625%;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .eyes-container {
            display: flex;
            justify-content: space-between;
            width: 38.957%;
            margin-bottom: 6.25%;
        }

        .eye {
            width: calc(35 * 100vw / 901);
            height: calc(34 * 100vw / 901);
            max-width: 35px;
            max-height: 34px;
            background-color: #8F8F8F;
            border-radius: 50%;
            transition: height 0.1s;
            flex-shrink: 0;
            cursor: pointer;
        }

        .mouth-container {
            width: 57.27%;
            height: auto;
        }

        .blink {
            height: 2px !important;
        }

        .slow-blink {
            transition: height 0.3s;
        }

        #mouth-path {
            transition: d 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="frame-container">
        <div class="frame" id="breathing-frame">
            <div class="content-wrapper">
                <div class="eyes-container">
                    <div class="eye" id="left-eye"></div>
                    <div class="eye" id="right-eye"></div>
                </div>
                <div class="mouth-container">
                    <svg id="mouth" width="100%" height="100%" viewBox="0 0 516 54" fill="none">
                        <path id="mouth-path" d="M2 27C138.333 27 377.667 27 514 27" stroke="#8F8F8F" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <audio id="meditation-audio" src="10-Minute Guided Meditation_ Self-Love  SELF (mp3cut.net).mp3"></audio>

    <script>
        const frame = document.getElementById("breathing-frame");
        const leftEye = document.getElementById("left-eye");
        const rightEye = document.getElementById("right-eye");
        const audio = document.getElementById("meditation-audio");
        const mouthPath = document.getElementById("mouth-path");
        let meditationActive = false;
        let deepBreathingActive = false;
        let audioContext = null;
        let currentMouthTimeout = null;

        // Blinking logic
        const blinkTypes = {
            quick: { duration: 200, class: 'blink' },
            slow: { duration: 300, class: 'blink slow-blink' },
        };

        function executeBlink(type) {
            return new Promise((resolve) => {
                const eyes = document.querySelectorAll('.eye');
                switch(type) {
                    case 'slow':
                        eyes.forEach(eye => eye.classList.add(blinkTypes.slow.class));
                        setTimeout(() => {
                            eyes.forEach(eye => eye.classList.remove(blinkTypes.slow.class));
                            resolve();
                        }, blinkTypes.slow.duration);
                        break;
                    default:
                        eyes.forEach(eye => eye.classList.add(blinkTypes.quick.class));
                        setTimeout(() => {
                            eyes.forEach(eye => eye.classList.remove(blinkTypes.quick.class));
                            resolve();
                        }, blinkTypes.quick.duration);
                }
            });
        }

        async function blink() {
            const types = ['quick', 'quick', 'quick', 'slow'];
            const selectedType = types[Math.floor(Math.random() * types.length)];
            
            await executeBlink(selectedType);
            
            const minDelay = 21000;
            const maxDelay = 29000;
            const nextBlinkDelay = Math.random() * (maxDelay - minDelay) + minDelay;
            
            setTimeout(blink, nextBlinkDelay);
        }

        function changeBreathingPattern(animation, duration = 120000) {
            if (deepBreathingActive) return;
            deepBreathingActive = true;
            frame.style.animation = 'none';
            frame.offsetHeight;
            frame.style.animation = animation;

            setTimeout(() => {
                frame.style.animation = "normalBreathing 5s ease-in-out infinite";
                deepBreathingActive = false;
            }, duration);
        }

        function setMouthCurve(intensity = 0) {
            const baseHeight = 27;
            const controlHeight = baseHeight + (intensity * 5);
            mouthPath.setAttribute("d", `M2 ${baseHeight}C138.333 ${controlHeight} 377.667 ${controlHeight} 514 ${baseHeight}`);
        }

        function smoothTransition(currentValue, targetValue, duration = 300) {
            const startValue = currentValue;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Easing function
                const eased = progress < .5 ? 
                    4 * progress * progress * progress : 
                    1 - Math.pow(-2 * progress + 2, 3) / 2;
                
                const currentIntensity = startValue + (targetValue - startValue) * eased;
                setMouthCurve(currentIntensity);
                
                if (progress < 1) {
                    currentMouthTimeout = requestAnimationFrame(update);
                }
            }
            
            if (currentMouthTimeout) {
                cancelAnimationFrame(currentMouthTimeout);
            }
            currentMouthTimeout = requestAnimationFrame(update);
        }

        function toggleMeditation() {
            if (meditationActive) {
                audio.pause();
                audio.currentTime = 0;
                smoothTransition(20, 0);
                meditationActive = false;
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                }
            } else {
                audio.play();
                monitorAudioForMouthMovement();
                meditationActive = true;
            }
        }

        function monitorAudioForMouthMovement() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            let lastIntensity = 0;

            function updateMouth() {
                if (!meditationActive) return;
                
                analyser.getByteFrequencyData(dataArray);
                const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                const targetIntensity = avg > 5 ? Math.min(avg, 50) : 0;
                
                if (Math.abs(targetIntensity - lastIntensity) > 0.1) {
                    smoothTransition(lastIntensity, targetIntensity);
                    lastIntensity = targetIntensity;
                }
                
                requestAnimationFrame(updateMouth);
            }
            updateMouth();
        }

        leftEye.addEventListener("click", toggleMeditation);
        rightEye.addEventListener("click", () => {
            changeBreathingPattern("deepBreathing 8s ease-in-out infinite", 120000);
        });

        // Start blinking
        setTimeout(blink, Math.random() * 5000 + 3000);
    </script>
</body>
</html>
