<!DOCTYPE html>
<html>
<head>
    <title>Breathem - Art by The Ricci</title>
    <style>
        /* Core layout styles */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #FFFFFF;
            padding: 20px;
        }

        .frame-container {
            width: 100%;
            max-width: 901px;
            margin: auto;
            position: relative;
        }

        .frame {
            width: 100%;
            height: 0;
            padding-bottom: 56.827%;
            border: 2px solid #8F8F8F;
            border-radius: calc(29 * 100vw / 901);
            position: relative;
            background-color: #FFFFFF;
            animation: normalBreathing 5s ease-in-out infinite;
            transition: background-color 2s ease;
            cursor: pointer; /* Make frame clickable */
        }

        .content-wrapper {
            position: absolute;
            top: 15.625%;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none; /* Let clicks pass through to frame */
        }

        .eyes-container {
            display: flex;
            justify-content: space-between;
            width: 38.957%;
            margin-bottom: 6.25%;
            pointer-events: auto; /* Re-enable clicks for eyes */
        }

        .eye {
            width: calc(35 * 100vw / 901);
            height: calc(34 * 100vw / 901);
            max-width: 35px;
            max-height: 34px;
            background-color: #8F8F8F;
            border-radius: 50%;
            transition: height 0.1s;
            flex-shrink: 0;
            cursor: pointer;
        }

        .mouth-container {
            width: 57.27%;
            height: auto;
        }

        /* Stress level colors - from white to pink */
        .stress-level-1 { --stress-color: rgb(255, 250, 250); }
        .stress-level-2 { --stress-color: rgb(255, 240, 240); }
        .stress-level-3 { --stress-color: rgb(255, 228, 228); }
        .stress-level-4 { --stress-color: rgb(255, 216, 216); }
        .stress-level-5 { --stress-color: rgb(255, 200, 200); }
        .stress-level-max { --stress-color: rgb(255, 180, 180); }

        /* Breathing animations */
        @keyframes normalBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.98); }
        }

        @keyframes deepBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.975); }
        }

        /* Blinking animation styles */
        .blink {
            height: 2px !important;
        }

        .slow-blink {
            transition: height 0.3s;
        }

        /* Message bubble styling */
        .speech-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 2px solid #8F8F8F;
            border-radius: 15px;
            padding: 8px 12px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="frame-container">
        <div class="frame" id="breathing-frame">
            <div class="content-wrapper">
                <div class="eyes-container">
                    <div class="eye" id="left-eye"></div>
                    <div class="eye" id="right-eye"></div>
                </div>
                <div class="mouth-container">
                    <svg id="mouth" width="100%" height="100%" viewBox="0 0 516 54" fill="none">
                        <path id="mouth-path" d="M2 2C138.333 47 377.667 47 514 2" stroke="#8F8F8F" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <audio id="meditation-audio" src="10-Minute Guided Meditation_ Self-Love  SELF (mp3cut.net).mp3"></audio>

    <script>
        // DOM elements we'll interact with
        const frame = document.getElementById("breathing-frame");
        const leftEye = document.getElementById("left-eye");
        const rightEye = document.getElementById("right-eye");
        const mouthPath = document.getElementById("mouth-path");
        const video = document.getElementById("camera-feed");

        // State variables for tracking various aspects of Breathem's behavior
        let faceDetector = null;
        let stressLevel = 0;
        let lastIntensity = 0;  // Added for smooth mouth transitions
        let isBlinking = false;

        // Initialize face detection system
        async function initializeFaceAPI() {
            try {
                await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
                await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
                console.log('Face models loaded');
                initializeCamera();
            } catch (error) {
                console.error('Error loading face models:', error);
            }
        }

        // Set up camera for face detection
        async function initializeCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: 640,
                        height: 480,
                        facingMode: 'user'
                    } 
                });
                
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    startFaceDetection();
                };
            } catch (err) {
                console.error('Error accessing camera:', err);
            }
        }

        // Main face detection loop
        async function startFaceDetection() {
            setInterval(async () => {
                if (!video.srcObject) return;

                try {
                    const detections = await faceapi.detectAllFaces(video)
                        .withFaceLandmarks()
                        .withFaceDescriptors();

                    const knownFaces = JSON.parse(localStorage.getItem('knownFaces') || '{}');

                    for (const detection of detections) {
                        // Try to match with known faces
                        let matchedPerson = null;
                        let minDistance = 0.6;

                        for (const [name, data] of Object.entries(knownFaces)) {
                            const descriptor = new Float32Array(data.descriptor);
                            const distance = faceapi.euclideanDistance(detection.descriptor, descriptor);

                            if (distance < minDistance) {
                                matchedPerson = { name, lastGreeting: data.lastGreeting };
                                minDistance = distance;
                            }
                        }

                        if (matchedPerson) {
                            const now = Date.now();
                            if (!matchedPerson.lastGreeting || 
                                now - matchedPerson.lastGreeting > 5 * 60 * 1000) {
                                greetPerson(matchedPerson.name);
                                
                                knownFaces[matchedPerson.name].lastGreeting = now;
                                localStorage.setItem('knownFaces', JSON.stringify(knownFaces));
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error in face detection:', error);
                }
            }, 2000);
        }

        // Handle greeting recognized people
        function greetPerson(name) {
            const messages = [
                `Hi ${name}! Would you like to meditate with me?`,
                `Great to see you, ${name}! Shall we practice some mindfulness?`,
                `Welcome back, ${name}! Ready for some deep breathing?`
            ];

            const message = messages[Math.floor(Math.random() * messages.length)];
            showMessage(message);
            
            // Animate mouth while "speaking"
            updateMouthShape(50);
            setTimeout(() => updateMouthShape(0), 2000);
        }

        // Display messages in speech bubble
        function showMessage(text) {
            const existingBubble = document.querySelector('.speech-bubble');
            if (existingBubble) existingBubble.remove();

            const bubble = document.createElement('div');
            bubble.className = 'speech-bubble';
            bubble.textContent = text;
            
            frame.appendChild(bubble);
            
            setTimeout(() => bubble.style.opacity = '1', 10);
            setTimeout(() => {
                bubble.style.opacity = '0';
                setTimeout(() => bubble.remove(), 300);
            }, 3000);
        }

        // Enhanced mouth shape update with smooth transitions
        function updateMouthShape(value = 0) {
            const baseControl = 47;
            const minControl = 25;
            
            // Smooth transition between values
            value = lastIntensity * 0.4 + value * 0.6;
            lastIntensity = value;
            
            // Calculate mouth curve parameters
            const normalizedValue = Math.pow(value / 100, 1.2);
            const controlY = baseControl - (normalizedValue * (baseControl - minControl));
            
            const baseX = 2;
            const narrowing = Math.min(12, value / 4);
            const startX = baseX + narrowing;
            const endX = 514 - narrowing;
            
            const leftControl = 138.333 + (narrowing / 2);
            const rightControl = 377.667 - (narrowing / 2);
            
            // Update SVG path with new curve parameters
            mouthPath.setAttribute("d", 
                `M${startX} 2C${leftControl} ${controlY} ${rightControl} ${controlY} ${endX} 2`
            );
        }

        // Blinking animation system
        async function blink() {
            if (isBlinking) return;
            isBlinking = true;

            const eyes = document.querySelectorAll('.eye');
            eyes.forEach(eye => eye.style.height = '2px');
            
            await new Promise(resolve => setTimeout(resolve, 200));
            
            eyes.forEach(eye => eye.style.height = '');
            isBlinking = false;

            // Schedule next blink
            const nextBlink = Math.random() * 8000 + 2000;
            setTimeout(blink, nextBlink);
        }

        // Initialize face detection and blinking
        initializeFaceAPI();
        setTimeout(blink, Math.random() * 5000 + 3000);

        // Event listeners for eye interactions - only show message when reducing stress
        leftEye.addEventListener('click', () => {
            if (stressLevel > 0) {
                stressLevel = 0;
                frame.className = 'frame';
                showMessage("Thanks mate! Feeling much better now!");
            }
        });

        rightEye.addEventListener('click', () => {
            if (stressLevel > 0) {
                stressLevel = 0;
                frame.className = 'frame';
                showMessage("Thanks mate! Feeling much better now!");
            }
        });
    </script>
</body>
</html>
