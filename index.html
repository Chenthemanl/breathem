<!DOCTYPE html>
<html>
<head>
    <title>Breathem - Art by The Ricci</title>
    <style>
        /* Previous styles remain the same until frame */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #FFFFFF;
            padding: 20px;
        }

        .frame-container {
            width: 100%;
            max-width: 901px;
            margin: auto;
            position: relative;
        }

        /* Modified frame to be clickable */
        .frame {
            width: 100%;
            height: 0;
            padding-bottom: 56.827%;
            border: 2px solid #8F8F8F;
            border-radius: calc(29 * 100vw / 901);
            position: relative;
            background-color: #FFFFFF;
            animation: normalBreathing 5s ease-in-out infinite;
            transition: background-color 2s ease;
            cursor: pointer; /* Make it clear the frame is clickable */
        }

        /* Rest of the styles remain the same */
        .content-wrapper {
            position: absolute;
            top: 15.625%;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none; /* Allow clicks to pass through to frame */
        }

        .eyes-container {
            display: flex;
            justify-content: space-between;
            width: 38.957%;
            margin-bottom: 6.25%;
            pointer-events: auto; /* Re-enable clicks for eyes */
        }

        .eye {
            width: calc(35 * 100vw / 901);
            height: calc(34 * 100vw / 901);
            max-width: 35px;
            max-height: 34px;
            background-color: #8F8F8F;
            border-radius: 50%;
            transition: height 0.1s;
            flex-shrink: 0;
            cursor: pointer;
        }

        /* Previous styles for mouth, animations, etc. remain the same */
        [Previous CSS remains unchanged...]

    </style>
</head>
<body>
    <div class="frame-container">
        <div class="frame" id="breathing-frame">
            <div class="content-wrapper">
                <div class="eyes-container">
                    <div class="eye" id="left-eye"></div>
                    <div class="eye" id="right-eye"></div>
                </div>
                <div class="mouth-container">
                    <svg id="mouth" width="100%" height="100%" viewBox="0 0 516 54" fill="none">
                        <path id="mouth-path" d="M2 2C138.333 47 377.667 47 514 2" stroke="#8F8F8F" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <audio id="meditation-audio" src="meditation.mp3"></audio>

    <script>
        // Previous DOM elements and state variables remain the same
        const frame = document.getElementById("breathing-frame");
        const leftEye = document.getElementById("left-eye");
        const rightEye = document.getElementById("right-eye");
        const audio = document.getElementById("meditation-audio");
        const mouthPath = document.getElementById("mouth-path");

        // State variables
        let meditationActive = false;
        let deepBreathingActive = false;
        let animationFrame = null;
        let lastIntensity = 0;
        let stressLevel = 0;
        let maxStressLevel = 5;

        // Enhanced speech recognition setup with increased sensitivity
        const initSpeechRecognition = () => {
            if ('webkitSpeechRecognition' in window) {
                const recognition = new webkitSpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US'; // Set language explicitly
                
                // Increase recognition sensitivity
                recognition.maxAlternatives = 3; // Get multiple interpretations
                
                recognition.onresult = (event) => {
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        // Check all alternatives for trigger words
                        for (let j = 0; j < event.results[i].length; j++) {
                            const transcript = event.results[i][j].transcript.toLowerCase();
                            checkForTriggerWords(transcript);
                        }
                    }
                };

                // Handle recognition end and errors
                recognition.onend = () => {
                    recognition.start(); // Immediately restart
                };

                recognition.onerror = (event) => {
                    if (event.error !== 'no-speech') {
                        recognition.stop();
                        setTimeout(() => recognition.start(), 500);
                    }
                };

                recognition.start();
            }
        };

        // Modified frame click handler
        frame.addEventListener("click", (event) => {
            // Only allow stress reduction if stressed and not clicking eyes
            if (stressLevel > 0 && !event.target.classList.contains('eye')) {
                resetStress();
            }
        });

        // Modified eye click handlers
        leftEye.addEventListener("click", (event) => {
            event.stopPropagation(); // Prevent frame click
            resetStress(); // Always reset stress
            toggleMeditation(); // Start meditation
        });

        rightEye.addEventListener("click", (event) => {
            event.stopPropagation(); // Prevent frame click
            resetStress(); // Always reset stress
            changeBreathingPattern("deepBreathing 8s ease-in-out infinite", 120000);
        });

        [Previous functions remain unchanged: checkForTriggerWords, increaseStress, 
        updateStressVisuals, showMessage, blinking system, audio system, etc.]

        // Initialize only necessary systems
        setTimeout(blink, Math.random() * 5000 + 3000);
        initSpeechRecognition();

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (audioCtx) {
                audioCtx.close();
            }
        });
    </script>
</body>
</html>
