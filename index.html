<!DOCTYPE html>
<html>
<head>
    <title>Mindful Face</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #FFFFFF;
            padding: 20px;
        }

        .frame-container {
            width: 100%;
            max-width: 901px;
            margin: auto;
        }

        .frame {
            width: 100%;
            height: 0;
            padding-bottom: 56.827%;
            border: 2px solid #8F8F8F;
            border-radius: calc(29 * 100vw / 901);
            position: relative;
            background-color: #FFFFFF;
            animation: normalBreathing 5s ease-in-out infinite;
        }

        @keyframes normalBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.98); }
        }

        @keyframes deepBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.975); }
        }

        .content-wrapper {
            position: absolute;
            top: 15.625%;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .eyes-container {
            display: flex;
            justify-content: space-between;
            width: 38.957%;
            margin-bottom: 6.25%;
        }

        .eye {
            width: 35px;
            height: 34px;
            background-color: #8F8F8F;
            border-radius: 50%;
            cursor: pointer;
        }

        .mouth-container {
            width: 57.27%;
            height: auto;
        }

        #mouth-path {
            transition: d 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="frame-container">
        <div class="frame" id="breathing-frame">
            <div class="content-wrapper">
                <div class="eyes-container">
                    <div class="eye" id="left-eye"></div>
                    <div class="eye" id="right-eye"></div>
                </div>
                <div class="mouth-container">
                    <svg id="mouth" width="100%" height="100%" viewBox="0 0 516 54" fill="none">
                        <path id="mouth-path" d="M2 2C138.333 52 377.667 52 514 2" stroke="#8F8F8F" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <audio id="meditation-audio" src="10-Minute Guided Meditation_ Self-Love  SELF (mp3cut.net).mp3"></audio>

    <script>
        const frame = document.getElementById("breathing-frame");
        const leftEye = document.getElementById("left-eye");
        const rightEye = document.getElementById("right-eye");
        const audio = document.getElementById("meditation-audio");
        const mouthPath = document.getElementById("mouth-path");
        let meditationActive = false;
        let deepBreathingActive = false;
        let lastAudioLevel = 0;

        // Default subtle curve path
        const defaultPath = "M2 2C138.333 52 377.667 52 514 2";

        function changeBreathingPattern(animation, duration = 120000) {
            if (deepBreathingActive) return;
            deepBreathingActive = true;
            frame.style.animation = 'none';
            frame.offsetHeight;
            frame.style.animation = animation;

            setTimeout(() => {
                frame.style.animation = "normalBreathing 5s ease-in-out infinite";
                deepBreathingActive = false;
            }, duration);
        }

        function toggleMeditation() {
            if (meditationActive) {
                audio.pause();
                audio.currentTime = 0;
                mouthPath.setAttribute("d", defaultPath);
                meditationActive = false;
            } else {
                audio.play();
                monitorAudioForMouthMovement();
                meditationActive = true;
            }
        }

        leftEye.addEventListener("click", toggleMeditation);
        rightEye.addEventListener("click", () => {
            changeBreathingPattern("deepBreathing 8s ease-in-out infinite", 120000);
        });

        function lerp(start, end, t) {
            return start * (1 - t) + end * t;
        }

        function monitorAudioForMouthMovement() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function updateMouth() {
                analyser.getByteFrequencyData(dataArray);
                const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                
                // Smooth the audio level changes
                lastAudioLevel = lerp(lastAudioLevel, avg, 0.3);
                
                if (lastAudioLevel > 5) {
                    // Calculate a smooth height based on audio level
                    const height = Math.min(25, Math.max(5, lastAudioLevel / 3));
                    const controlHeight = 52 - height/2; // Adjust control points for smoother curve
                    
                    // Create a smooth curve that responds to audio
                    mouthPath.setAttribute("d", 
                        `M2 ${2 + height/2}
                         C138.333 ${controlHeight} 377.667 ${controlHeight} 
                         514 ${2 + height/2}`
                    );
                } else {
                    // Return to default subtle curve when audio is quiet
                    mouthPath.setAttribute("d", defaultPath);
                }
                
                if (!audio.paused) {
                    requestAnimationFrame(updateMouth);
                }
            }
            updateMouth();
        }
    </script>
</body>
</html>
